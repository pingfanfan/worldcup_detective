<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="32%" r="80%">
      <stop offset="0%" stop-color="#123026"/>
      <stop offset="55%" stop-color="#0c1a14"/>
      <stop offset="100%" stop-color="#070d0a"/>
    </radialGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2ee8c0"/>
      <stop offset="100%" stop-color="#1aa784"/>
    </linearGradient>
    <linearGradient id="ball" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#cfe0d9"/>
    </linearGradient>
  </defs>

  <!-- 圆角底板 -->
  <rect x="0" y="0" width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- 球场线条（点缀） -->
  <g stroke="#1f4035" stroke-width="3" fill="none" opacity="0.8">
    <circle cx="256" cy="256" r="150"/>
    <line x1="256" y1="60" x2="256" y2="160"/>
    <line x1="256" y1="352" x2="256" y2="452"/>
    <rect x="176" y="60" width="160" height="46" rx="4"/>
    <rect x="176" y="406" width="160" height="46" rx="4"/>
  </g>

  <!-- 放大镜（球探的眼） -->
  <g>
    <!-- 镜柄 -->
    <rect x="332" y="332" width="116" height="34" rx="17" transform="rotate(45 332 332)" fill="url(#ring)"/>
    <!-- 镜圈 -->
    <circle cx="232" cy="232" r="118" fill="none" stroke="url(#ring)" stroke-width="26"/>
    <circle cx="232" cy="232" r="92" fill="#0a1813"/>

    <!-- 镜内足球 -->
    <circle cx="232" cy="232" r="70" fill="url(#ball)"/>
    <g fill="#0c1a14">
      <!-- 中心五边形 -->
      <polygon points="232,200 256,218 247,247 217,247 208,218"/>
      <!-- 周边黑块 -->
      <polygon points="232,166 214,180 222,196 242,196 250,180"/>
      <polygon points="284,214 268,206 258,222 270,240 288,232"/>
      <polygon points="262,288 270,268 256,256 240,266 246,286"/>
      <polygon points="202,288 222,286 218,266 200,262 192,278"/>
      <polygon points="180,214 196,228 208,222 198,204 182,196"/>
    </g>
  </g>

  <!-- 角标：AI 脉冲点 -->
  <circle cx="392" cy="150" r="20" fill="#2ee8c0"/>
  <circle cx="392" cy="150" r="20" fill="none" stroke="#2ee8c0" stroke-width="3" opacity="0.4">
    <animate attributeName="r" values="20;34;20" dur="2.4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0;0.5" dur="2.4s" repeatCount="indefinite"/>
  </circle>
</svg>
